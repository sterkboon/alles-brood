kind = "web"
previewPath = "/"
title = "Baker Dashboard"
version = "1.0.0"
id = "artifacts/baker-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23893

[services.development]
run = "pnpm --filter @workspace/baker-dashboard run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/baker-dashboard", "run", "build"]
publicDir = "artifacts/baker-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23893"
BASE_PATH = "/"
